name: Push releases as OCI artifact

on:
  push:
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          TAG=${GITHUB_REF_NAME#v}
          REPO=${GITHUB_REPOSITORY,,}
          digest=$(flux push artifact oci://ghcr.io/${REPO}/releases:${TAG} \
            --path="./releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Tag artifact
        run: |
          REPO=${GITHUB_REPOSITORY,,}
          flux tag artifact \
            oci://ghcr.io/${REPO}/releases:${{ steps.push.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag latest
